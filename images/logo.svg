<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#45d4ce"/>
      <stop offset="100%" stop-color="#2da8a3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Fish body (elliptical) -->
  <ellipse cx="240" cy="262" rx="112" ry="64" fill="white" opacity="0.95"/>
  <!-- Fish tail - two angle brackets forming a code arrow > -->
  <path d="M 348 262 L 420 200 M 348 262 L 420 324" stroke="white" stroke-width="34" stroke-linecap="round" fill="none"/>
  <!-- Fish mouth - angle bracket < as code symbol -->
  <path d="M 143 215 L 100 262 L 143 309" stroke="white" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Fish eye -->
  <circle cx="195" cy="242" r="14" fill="#37c6c0"/>
  <!-- Code dot hint (programming accent) -->
  <circle cx="380" cy="240" r="7" fill="#37c6c0"/>
  <circle cx="380" cy="284" r="7" fill="#37c6c0"/>
</svg>
